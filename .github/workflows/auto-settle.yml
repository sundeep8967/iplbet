name: Auto Settle IPL Matches

on:
  # ── Scheduled runs ──────────────────────────────────────────────────────────
  schedule:
    # WEEKDAYS (Mon-Fri) — 10:30 PM to 2:00 AM IST (Night matches only)
    - cron: '0,30 17,18,19,20 * * 1-5'
    # WEEKENDS (Sat-Sun) — 6:30 PM to 2:00 AM IST (Includes 3:30 PM day matches)
    - cron: '0,30 13,14,15,16,17,18,19,20 * * 0,6'

  # ── Manual trigger from GitHub UI ───────────────────────────────────────────
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-settle already settled matches?'
        required: false
        default: 'false'

jobs:
  settle:
    name: Scrape & Settle Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run auto-settle script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/autoSettle.js

      - name: Upload run log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: settle-error-log
          path: |
            npm-debug.log
          retention-days: 7
