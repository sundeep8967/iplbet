name: Match Start Reminders

on:
  schedule:
    # EVERY DAY — 7:00 PM IST (30 mins before 7:30 PM match) -> UTC: 13:30
    - cron: '30 13 * * *'
    # WEEKENDS — 3:00 PM IST (30 mins before 3:30 PM match) -> UTC: 09:30
    - cron: '30 9 * * 0,6'

  workflow_dispatch: # allow manual testing

jobs:
  send-reminders:
    name: Check & Send Reminders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Send Reminders
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: node scripts/sendReminders.js
